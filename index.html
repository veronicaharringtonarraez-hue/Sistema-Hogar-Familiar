<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HomeClean-Up · Familia</title>
<link rel="icon" type="image/png" href="icon-homeclean.png">
<link rel="apple-touch-icon" href="icon-homeclean.png">
<meta name="apple-mobile-web-app-title" content="HomeClean-Up">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:'Baloo 2', system-ui, sans-serif;
    --font-body:'Nunito', system-ui, sans-serif;
    --bg:#eef0f8;
    --card:#ffffff;
    --ink:#221d3a;
    --ink-2:#6a6385;
    --ink-3:#a09abb;
    --muted:#9b96b4;
    --line:#ece9f6;
    --good:#22c178;
    --shadow:0 10px 30px -12px rgba(40,30,90,.28);
    --shadow-sm:0 6px 16px -8px rgba(40,30,90,.25);
    /* tema activo (se sobreescribe por perfil) */
    --a:#7C5CFF; --b:#B69DFF; --c:#E9E2FF; --tink:#3A2D7A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  #root{height:100%;}

  /* ===== App shell: phone column centered on big screens ===== */
  .stage{
    min-height:100%;
    display:flex;align-items:stretch;justify-content:center;
    background:
      radial-gradient(1200px 600px at 15% -5%, #e7e1ff 0%, transparent 55%),
      radial-gradient(1000px 600px at 110% 10%, #d9f5f0 0%, transparent 50%),
      var(--bg);
  }
  .phone{
    width:100%;max-width:440px;position:relative;
    background:var(--bg);
    display:flex;flex-direction:column;
    min-height:100vh;
    box-shadow:0 0 60px -20px rgba(40,30,90,.35);
    overflow:hidden;
  }
  @media(min-width:480px){
    .phone{margin:18px 0;min-height:calc(100vh - 36px);border-radius:38px;}
    .stage{padding:0 16px;}
  }

  /* ===== scroll area ===== */
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:104px;}
  .scroll::-webkit-scrollbar{width:0;}
  .pad{padding:0 18px;}

  /* ===== headings ===== */
  h1,h2,h3,h4{font-family:var(--font-display);margin:0;line-height:1.05;color:var(--ink);}
  .display{font-family:var(--font-display);font-weight:800;}
  .eyebrow{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}

  /* ===== generic card ===== */
  .card{background:var(--card);border-radius:26px;box-shadow:var(--shadow-sm);}
  .soft{border-radius:22px;}

  /* ===== top bar ===== */
  .topbar{padding:14px 18px 6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hi-wrap{display:flex;align-items:center;gap:11px;min-width:0;flex:1;}
  .ava{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:3px solid #fff;box-shadow:0 4px 10px -4px rgba(0,0,0,.3);background:#ddd;}
  .ava.ring{box-shadow:0 0 0 3px var(--a), 0 4px 10px -4px rgba(0,0,0,.3);border-color:#fff;}
  .hi-text{min-width:0;flex:1;}
  .hi-text .sm{font-size:13px;color:var(--ink-2);font-weight:700;line-height:1;}
  .hi-text .nm{font-family:var(--font-display);font-weight:800;font-size:21px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pts-pill{
    display:flex;align-items:center;gap:6px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--a),var(--b));
    color:#fff;font-family:var(--font-display);font-weight:800;font-size:16px;
    padding:8px 14px;border-radius:20px;box-shadow:0 8px 18px -8px var(--a);
  }
  .pts-pill .star{font-size:15px;}

  /* ===== profile switcher row ===== */
  .who-row{display:flex;gap:10px;padding:10px 18px 4px;overflow-x:auto;}
  .who-row::-webkit-scrollbar{height:0;}
  .who{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;width:62px;cursor:pointer;opacity:.55;transition:opacity .15s, transform .15s;}
  .who.on{opacity:1;transform:translateY(-1px);}
  .who img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:var(--shadow-sm);}
  .who.on img{box-shadow:0 0 0 3px var(--who-a), 0 6px 14px -6px var(--who-a);}
  .who .lbl{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--ink-2);}
  .who.on .lbl{color:var(--ink);}
  .who .face{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;font-size:24px;border:3px solid #fff;box-shadow:var(--shadow-sm);}

  /* ===== gradient hero tile ===== */
  .hero{
    position:relative;overflow:hidden;border-radius:30px;color:#fff;
    padding:18px 20px;box-shadow:var(--shadow);
    background:linear-gradient(135deg,var(--a),var(--b));
  }
  .hero .deco{position:absolute;right:-12px;bottom:-22px;font-size:120px;opacity:.18;line-height:1;transform:rotate(-8deg);}
  .hero .crown{position:absolute;right:14px;top:14px;font-size:30px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.25));}

  /* ===== quick tiles ===== */
  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
  .tile{
    border-radius:22px;padding:14px 12px;color:#fff;cursor:pointer;
    box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
    display:flex;flex-direction:column;gap:8px;min-height:96px;justify-content:space-between;
    transition:transform .12s;
  }
  .tile:active{transform:scale(.96);}
  .tile .ic{font-size:26px;}
  .tile .tl{font-family:var(--font-display);font-weight:700;font-size:15px;line-height:1.05;}

  /* ===== section header ===== */
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px;}
  .sec-h h2{font-size:22px;font-weight:800;white-space:nowrap;}
  .sec-h .link{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--a);cursor:pointer;}

  /* ===== mission card ===== */
  .mission{
    display:flex;align-items:center;gap:13px;background:var(--card);
    border-radius:20px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);
    transition:transform .12s, opacity .2s;cursor:pointer;
  }
  .mission:active{transform:scale(.985);}
  .mission .m-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:23px;flex:0 0 auto;background:var(--c);}
  .mission .m-body{flex:1;min-width:0;}
  .mission .m-title{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1.1;}
  .mission .m-sub{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .mission.done{opacity:.62;}
  .mission.done .m-title{text-decoration:line-through;text-decoration-color:var(--muted);}
  .check{
    width:30px;height:30px;border-radius:50%;border:2.5px solid #d9d4ec;flex:0 0 auto;
    display:grid;place-items:center;color:#fff;font-size:16px;transition:all .15s;background:#fff;
  }
  .check.on{background:var(--good);border-color:var(--good);box-shadow:0 6px 14px -6px var(--good);}

  /* ===== chips / badges ===== */
  .chip{font-family:var(--font-display);font-weight:700;font-size:11.5px;padding:2px 9px;border-radius:20px;background:var(--c);color:var(--tink);white-space:nowrap;}
  .chip.pts{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;}
  .chip.gray{background:#f0eef8;color:var(--ink-2);}
  .chip.out{background:transparent;border:1.5px dashed #cfc9e4;color:var(--muted);}

  /* ===== Misiones: desplegables + listas de microtareas ===== */
  .fold .fold-h{cursor:pointer;padding:12px 14px;align-items:center;gap:10px;}
  .fold .chev{font-size:14px;color:var(--ink-2);font-weight:800;flex:0 0 auto;}
  .fold .fold-b{padding:2px 14px 12px;border-top:1px solid var(--line,#eee);}
  .fold .m-ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:21px;flex:0 0 auto;background:var(--c,#f0eef8);}
  .micro-li{display:flex;align-items:center;gap:9px;padding:7px 2px;font-size:14px;font-weight:600;color:var(--ink);}
  .micro-li + .micro-li{border-top:1px dashed #efecf8;}
  .micro-li .mli-ic{width:24px;text-align:center;flex:0 0 auto;font-size:16px;}
  .micro-li .grow{flex:1;min-width:0;}
  .micro-li .prio{width:22px;height:22px;flex:0 0 auto;display:grid;place-items:center;border-radius:50%;background:var(--a,#7C5CFF);color:#fff;font-family:var(--font-display);font-weight:800;font-size:12px;}
  .day-select{width:100%;border:2px solid #e0dcef;background:#fff;border-radius:14px;padding:12px 14px;font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink);}

  /* ===== segmented control ===== */
  .seg{display:flex;background:#e7e3f5;border-radius:16px;padding:4px;gap:4px;}
  .seg button{
    flex:1;border:0;background:transparent;border-radius:12px;padding:9px 6px;cursor:pointer;
    font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-2);transition:all .15s;
  }
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);}

  /* ===== progress bar ===== */
  .bar{height:12px;background:#ece9f6;border-radius:10px;overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--a),var(--b));transition:width .5s cubic-bezier(.4,1.3,.5,1);}

  /* ===== pet card ===== */
  .pet-photo{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:24px;}

  /* ===== bottom nav ===== */
  .nav{
    position:absolute;left:0;right:0;bottom:0;z-index:30;
    display:flex;justify-content:space-around;align-items:center;
    background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:9px 8px calc(9px + env(safe-area-inset-bottom));
  }
  .nav button{
    border:0;background:transparent;cursor:pointer;flex:1;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--muted);padding:4px 0;
    transition:color .15s;
  }
  .nav button .ni{font-size:22px;line-height:1;transition:transform .15s;}
  .nav button.on{color:var(--a);}
  .nav button.on .ni{transform:translateY(-2px) scale(1.08);}

  /* ===== banco (iframe del módulo de banca) ===== */
  .bank-frame{
    flex:1 1 auto;width:100%;border:0;display:block;background:#FFF7FB;
    margin-bottom:calc(62px + env(safe-area-inset-bottom));
  }

  /* ===== misc ===== */
  .row{display:flex;align-items:center;gap:10px;}
  .between{justify-content:space-between;}
  .wrap{flex-wrap:wrap;}
  .muted{color:var(--ink-2);}
  .center{text-align:center;}
  .grow{flex:1;min-width:0;}
  .pop{animation:pop .4s cubic-bezier(.3,1.5,.5,1);}
  @keyframes pop{0%{transform:scale(.8);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .float{animation:float 3.5s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .fade{animation:fade .35s ease;}
  @keyframes fade{from{transform:translateY(8px);}to{transform:none;}}

  /* confetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti i{position:absolute;width:10px;height:14px;border-radius:2px;top:-20px;animation:fall 1.5s linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}

  /* toast */
  .toast{
    position:absolute;left:50%;bottom:118px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;
    padding:11px 18px;border-radius:16px;box-shadow:var(--shadow);z-index:120;white-space:nowrap;
    animation:toastIn .3s ease;
  }
  @keyframes toastIn{from{opacity:0;}to{opacity:1;}}

  /* reward grid */
  .rewards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .reward{border-radius:16px;padding:10px 4px;text-align:center;background:#f6f4fc;position:relative;}
  .reward.unlocked{background:linear-gradient(135deg,var(--c),#fff);box-shadow:var(--shadow-sm);}
  .reward .ri{font-size:24px;filter:grayscale(1);opacity:.45;}
  .reward.unlocked .ri{filter:none;opacity:1;}
  .reward .rp{font-family:var(--font-display);font-weight:700;font-size:10.5px;color:var(--ink-2);margin-top:3px;}

  /* ===== Mascota animada ===== */
  .pet-stage{position:relative;height:150px;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg, color-mix(in srgb,var(--c) 70%,#fff) 0%, #fff 100%);
    display:grid;place-items:center;}
  .pet-house{position:absolute;right:12px;bottom:8px;font-size:46px;filter:drop-shadow(0 4px 4px rgba(0,0,0,.12));}
  .pet-char{position:relative;font-size:74px;line-height:1;transition:transform .5s ease, opacity .5s ease;}
  .pet-face-emoji{font-size:74px;line-height:1;}
  .pet-char .pet-img{width:124px;height:124px;object-fit:contain;display:block;filter:drop-shadow(0 6px 6px rgba(0,0,0,.14));}
  .pet-emo{position:absolute;top:-6px;right:-22px;font-size:30px;}
  .pet-zzz{position:absolute;top:24px;left:50%;margin-left:18px;font-size:24px;animation:petZzz 2.2s ease-in-out infinite;}
  @keyframes petZzz{0%{transform:translateY(0);opacity:.3}50%{transform:translateY(-8px);opacity:1}100%{transform:translateY(0);opacity:.3}}
  .pet-stage.bouncy .pet-char{animation:petBounce 1s ease-in-out infinite;}
  @keyframes petBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .pet-stage.sad .pet-char{filter:saturate(.7);animation:petSad 3s ease-in-out infinite;}
  @keyframes petSad{0%,100%{transform:translateY(2px) rotate(-2deg)}50%{transform:translateY(4px) rotate(2deg)}}
  .pet-stage.playing .pet-char{animation:petPlay .5s ease-in-out infinite;}
  @keyframes petPlay{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
  .pet-stage.to-home .pet-char{animation:petHome 2.4s ease forwards;}
  @keyframes petHome{0%{transform:translateX(0) scale(1);opacity:1}70%{transform:translateX(34vw) scale(.5);opacity:1}100%{transform:translateX(38vw) scale(.2);opacity:0}}
  .pet-hearts{position:absolute;inset:0;pointer-events:none;}
  .pet-hearts span{position:absolute;bottom:40px;font-size:22px;animation:petHeart 1.8s ease-in infinite;}
  .pet-hearts span:nth-child(1){left:38%;animation-delay:0s}
  .pet-hearts span:nth-child(2){left:50%;animation-delay:.5s}
  .pet-hearts span:nth-child(3){left:60%;animation-delay:1s}
  @keyframes petHeart{0%{transform:translateY(0) scale(.6);opacity:0}25%{opacity:1}100%{transform:translateY(-70px) scale(1.1);opacity:0}}
  .pet-treat{position:absolute;left:30%;top:40%;font-size:30px;animation:petTreat 1.6s ease forwards;}
  @keyframes petTreat{0%{transform:translate(-40px,20px) scale(.5);opacity:0}30%{opacity:1}100%{transform:translate(10px,0) scale(1);opacity:1}}
  .pet-msg{margin-top:10px;background:var(--c);color:var(--tink);border-radius:14px;padding:10px 14px;
    font-weight:700;font-size:13.5px;text-align:center;min-height:20px;}
  .pet-treats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
  .pet-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:0;cursor:pointer;
    background:linear-gradient(135deg,var(--c),#fff);border-radius:16px;padding:10px 4px;box-shadow:var(--shadow-sm);transition:transform .12s;}
  .pet-btn:active{transform:scale(.93);}
  .pet-btn-ic{font-size:26px;line-height:1;}
  .pet-btn-lb{font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--tink);text-align:center;line-height:1.1;}
  .pet-btn.locked{background:#f1eef8;cursor:default;opacity:.85;}
  .pet-btn.locked .pet-btn-ic{filter:grayscale(1);opacity:.5;}
  .pet-btn-lock{font-family:var(--font-display);font-weight:800;font-size:9.5px;color:var(--ink-2);}
  .pet-phrases{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .pet-phrase-btn{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;border:0;border-radius:14px;padding:10px 16px;font-family:var(--font-display);font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .pet-phrase-btn:active{transform:scale(.95);}
  .pet-phrase-btn:disabled{opacity:.5;}
  .pet-phrase-count{font-weight:800;font-size:12.5px;color:var(--ink-2);}

  /* load comparison bars */
  .loadbar{height:26px;border-radius:13px;background:#ece9f6;overflow:hidden;position:relative;}
  .loadbar > i{display:block;height:100%;border-radius:13px;transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .loadbar .lv{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--ink);}

  /* ===== delete button on custom tasks ===== */
  .mission .del{border:0;background:#f3eef9;color:var(--muted);width:26px;height:26px;border-radius:50%;font-size:17px;cursor:pointer;flex:0 0 auto;display:grid;place-items:center;line-height:1;margin-left:2px;}
  .mission .del:active{background:#fde2e2;color:#d33;}

  /* ===== add-task button ===== */
  .add-btn{width:100%;border:2px dashed #cfc9e4;background:transparent;border-radius:18px;padding:14px;font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--a);cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
  .add-btn:active{transform:scale(.98);}

  /* ===== modal / bottom sheet ===== */
  .modal-bg{position:absolute;inset:0;background:rgba(30,22,60,.42);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease;}
  .sheet{width:100%;background:#fff;border-radius:30px 30px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -14px 44px -12px rgba(0,0,0,.35);max-height:92%;overflow-y:auto;animation:sheetUp .32s cubic-bezier(.3,1,.4,1);}
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}
  .fld{margin-top:16px;}
  .fld > label{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink-2);display:block;margin-bottom:8px;}
  .inp{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-family:var(--font-body);font-weight:700;font-size:15px;color:var(--ink);background:#faf9ff;}
  .inp:focus{outline:none;border-color:var(--a);}
  .pick-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .pick-row::-webkit-scrollbar{height:0;}
  .pick-row .pk{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:.5;transition:opacity .15s;}
  .pick-row .pk.on{opacity:1;}
  .pick-row .pk .lbl{font-size:11.5px;font-weight:700;font-family:var(--font-display);color:var(--ink-2);}
  .ico-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:7px;}
  .ico{aspect-ratio:1;border-radius:13px;border:2px solid var(--line);background:#faf9ff;font-size:18px;display:grid;place-items:center;cursor:pointer;transition:all .12s;}
  .ico.on{border-color:var(--a);background:var(--c);transform:scale(1.05);}
  .btn-primary{width:100%;margin-top:20px;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-family:var(--font-display);font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 12px 24px -10px var(--a);}

  /* ===== sección Familia: en celular apilado; en PC 2/3 + 1/3 ===== */
  .fam-aside{margin-bottom:14px;}

  /* =========================================================
     VISTA DE COMPUTADORA / PANTALLAS GRANDES (responsive)
     En el celular no cambia nada. Aquí el contenido se organiza
     en una cuadrícula alineada (en orden de lectura), para que se
     vea estructurado como una app de escritorio y no disperso.
     ========================================================= */
  @media(min-width:1000px){
    .stage{align-items:flex-start;padding:24px;}
    .phone{
      max-width:1000px;width:100%;border-radius:28px;margin:0 auto;
      min-height:calc(100vh - 48px);
    }
    /* barra superior y selector de perfiles centrados */
    .topbar{padding:18px 30px 8px;}
    .who-row{padding:10px 30px 6px;justify-content:center;flex-wrap:wrap;overflow-x:visible;}

    /* cuadrícula ordenada: 2 columnas alineadas, no masonry */
    .pad{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px 22px;align-items:start;align-content:start;
      padding:10px 30px;max-width:980px;margin:0 auto;
    }
    .pad > *{margin-bottom:0;}
    /* estos elementos ocupan toda la fila */
    .pad > .hero,
    .pad > .tiles,
    .pad > .sec-h,
    .pad > .add-btn,
    .pad > .seg,
    .pad > p{grid-column:1 / -1;}

    /* sección Familia: perfiles (2/3) a la izquierda, carga (1/3) a la derecha */
    .pad.fam-screen{display:block;max-width:980px;margin:0 auto;padding:10px 30px;}
    .fam-layout{display:grid;grid-template-columns:2fr 1fr;gap:22px;align-items:start;}
    .fam-main{grid-column:1;grid-row:1;}
    .fam-aside{grid-column:2;grid-row:1;margin-bottom:0;}
    .fam-aside .card{position:sticky;top:24px;}

    /* modales como diálogo centrado en lugar de hoja inferior */
    .modal-bg{align-items:center;}
    .sheet{max-width:480px;border-radius:26px;padding:24px;
      max-height:88vh;animation:fade .2s ease;}

    /* barra inferior como pastilla central */
    .nav{left:50%;right:auto;transform:translateX(-50%);
      max-width:520px;width:auto;gap:18px;
      border:1px solid var(--line);border-radius:22px 22px 0 0;padding:10px 26px;}
    .nav button{flex:0 0 auto;min-width:76px;}
  }

  /* Pantallas muy anchas: una tercera columna y algo más de ancho */
  @media(min-width:1500px){
    .phone{max-width:1180px;}
    .pad{max-width:1140px;grid-template-columns:repeat(3,minmax(0,1fr));}
  }
</style>
</head>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
