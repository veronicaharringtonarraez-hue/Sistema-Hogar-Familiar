<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Familia · Tareas y Mascotas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:'Baloo 2', system-ui, sans-serif;
    --font-body:'Nunito', system-ui, sans-serif;
    --bg:#eef0f8;
    --card:#ffffff;
    --ink:#221d3a;
    --ink-2:#6a6385;
    --ink-3:#a09abb;
    --muted:#9b96b4;
    --line:#ece9f6;
    --good:#22c178;
    --shadow:0 10px 30px -12px rgba(40,30,90,.28);
    --shadow-sm:0 6px 16px -8px rgba(40,30,90,.25);
    /* tema activo (se sobreescribe por perfil) */
    --a:#7C5CFF; --b:#B69DFF; --c:#E9E2FF; --tink:#3A2D7A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  #root{height:100%;}

  /* ===== App shell: desktop window ===== */
  .stage{
    min-height:100%;
    display:flex;align-items:stretch;justify-content:center;
    background:
      radial-gradient(1200px 600px at 15% -5%, #e7e1ff 0%, transparent 55%),
      radial-gradient(1000px 600px at 110% 10%, #d9f5f0 0%, transparent 50%),
      var(--bg);
  }
  .appwin{
    width:100%;max-width:1240px;margin:24px;position:relative;
    background:var(--card);
    display:flex;
    min-height:calc(100vh - 48px);
    border-radius:30px;
    box-shadow:0 36px 90px -34px rgba(40,30,90,.55);
    overflow:hidden;
  }
  /* sidebar */
  .sidebar{
    width:250px;flex:0 0 auto;
    background:linear-gradient(185deg,#fbfaff,#f3f1fb);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:6px;
    padding:24px 16px;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:2px 10px 18px;}
  .brand .logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 8px 18px -8px var(--a);}
  .brand .bt{font-family:var(--font-display);font-weight:800;font-size:18px;line-height:1;}
  .brand .bs{font-size:12px;color:var(--ink-2);font-weight:700;}
  .side-nav{display:flex;flex-direction:column;gap:5px;}
  .side-nav button{
    display:flex;align-items:center;gap:13px;border:0;background:transparent;
    border-radius:15px;padding:12px 15px;cursor:pointer;text-align:left;width:100%;
    font-family:var(--font-display);font-weight:700;font-size:15.5px;color:var(--ink-2);
    transition:background .15s,color .15s,transform .1s;
  }
  .side-nav button .ni{font-size:21px;line-height:1;}
  .side-nav button:hover{background:#efebfa;color:var(--ink);}
  .side-nav button.on{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;box-shadow:0 10px 22px -10px var(--a);}
  .side-foot{margin-top:auto;padding:12px 14px 2px;font-size:12px;color:var(--muted);font-weight:700;}
  /* main column */
  .main{flex:1;min-width:0;position:relative;display:flex;flex-direction:column;background:var(--bg);}

  /* ===== scroll area ===== */
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:30px;}
  .scroll::-webkit-scrollbar{width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:#dcd6ee;border-radius:8px;border:3px solid var(--bg);}
  .pad{padding:0 32px;max-width:1040px;}

  /* desktop layout helpers */
  .home-top{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:stretch;margin-top:6px;}
  .mlist{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .mlist .mission{margin-bottom:0;}
  .cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  @media(max-width:820px){
    .home-top{grid-template-columns:1fr;}
    .mlist,.cardgrid{grid-template-columns:1fr;}
  }
  @media(max-width:680px){
    .appwin{flex-direction:column;margin:0;border-radius:0;min-height:100vh;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:10px 12px;gap:4px;overflow-x:auto;}
    .brand{padding:0 8px 0 4px;}.brand .bs{display:none;}
    .side-nav{flex-direction:row;}
    .side-foot{display:none;}
    .pad{padding:0 18px;}
  }

  /* ===== headings ===== */
  h1,h2,h3,h4{font-family:var(--font-display);margin:0;line-height:1.05;color:var(--ink);}
  .display{font-family:var(--font-display);font-weight:800;}
  .eyebrow{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}

  /* ===== generic card ===== */
  .card{background:var(--card);border-radius:26px;box-shadow:var(--shadow-sm);}
  .soft{border-radius:22px;}

  /* ===== top bar ===== */
  .topbar{padding:20px 32px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hi-wrap{display:flex;align-items:center;gap:11px;min-width:0;flex:1;}
  .ava{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:3px solid #fff;box-shadow:0 4px 10px -4px rgba(0,0,0,.3);background:#ddd;}
  .ava.ring{box-shadow:0 0 0 3px var(--a), 0 4px 10px -4px rgba(0,0,0,.3);border-color:#fff;}
  .hi-text{min-width:0;flex:1;}
  .hi-text .sm{font-size:13px;color:var(--ink-2);font-weight:700;line-height:1;}
  .hi-text .nm{font-family:var(--font-display);font-weight:800;font-size:21px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pts-pill{
    display:flex;align-items:center;gap:6px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--a),var(--b));
    color:#fff;font-family:var(--font-display);font-weight:800;font-size:16px;
    padding:8px 14px;border-radius:20px;box-shadow:0 8px 18px -8px var(--a);
  }
  .pts-pill .star{font-size:15px;}

  /* ===== profile switcher row ===== */
  .who-row{display:flex;gap:12px;padding:8px 32px 6px;overflow-x:auto;}
  .who-row::-webkit-scrollbar{height:0;}
  .who{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;width:62px;cursor:pointer;opacity:.55;transition:opacity .15s, transform .15s;}
  .who.on{opacity:1;transform:translateY(-1px);}
  .who img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:var(--shadow-sm);}
  .who.on img{box-shadow:0 0 0 3px var(--who-a), 0 6px 14px -6px var(--who-a);}
  .who .lbl{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--ink-2);}
  .who.on .lbl{color:var(--ink);}
  .who .face{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;font-size:24px;border:3px solid #fff;box-shadow:var(--shadow-sm);}

  /* ===== gradient hero tile ===== */
  .hero{
    position:relative;overflow:hidden;border-radius:30px;color:#fff;
    padding:18px 20px;box-shadow:var(--shadow);
    background:linear-gradient(135deg,var(--a),var(--b));
  }
  .hero .deco{position:absolute;right:-12px;bottom:-22px;font-size:120px;opacity:.18;line-height:1;transform:rotate(-8deg);}
  .hero .crown{position:absolute;right:14px;top:14px;font-size:30px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.25));}
  .hcol{display:flex;flex-direction:column;justify-content:center;padding:18px 20px;}

  /* ===== quick tiles ===== */
  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
  .tile{
    border-radius:22px;padding:14px 12px;color:#fff;cursor:pointer;
    box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
    display:flex;flex-direction:column;gap:8px;min-height:96px;justify-content:space-between;
    transition:transform .12s;
  }
  .tile:active{transform:scale(.96);}
  .tile .ic{font-size:26px;}
  .tile .tl{font-family:var(--font-display);font-weight:700;font-size:15px;line-height:1.05;}

  /* ===== section header ===== */
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px;}
  .sec-h h2{font-size:22px;font-weight:800;white-space:nowrap;}
  .sec-h .link{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--a);cursor:pointer;}

  /* ===== mission card ===== */
  .mission{
    display:flex;align-items:center;gap:13px;background:var(--card);
    border-radius:20px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);
    transition:transform .12s, opacity .2s;cursor:pointer;
  }
  .mission:active{transform:scale(.985);}
  .mission .m-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:23px;flex:0 0 auto;background:var(--c);}
  .mission .m-body{flex:1;min-width:0;}
  .mission .m-title{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1.1;}
  .mission .m-sub{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .mission.done{opacity:.62;}
  .mission.done .m-title{text-decoration:line-through;text-decoration-color:var(--muted);}
  .check{
    width:30px;height:30px;border-radius:50%;border:2.5px solid #d9d4ec;flex:0 0 auto;
    display:grid;place-items:center;color:#fff;font-size:16px;transition:all .15s;background:#fff;
  }
  .check.on{background:var(--good);border-color:var(--good);box-shadow:0 6px 14px -6px var(--good);}
  .check.wait{background:#f5a623;border-color:#f5a623;color:#fff;font-size:14px;box-shadow:0 6px 14px -6px #f5a623;}
  .mission.waiting{box-shadow:0 0 0 1.5px #f7c873 inset, var(--shadow-sm);}

  /* ===== chips / badges ===== */
  .chip{font-family:var(--font-display);font-weight:700;font-size:11.5px;padding:2px 9px;border-radius:20px;background:var(--c);color:var(--tink);white-space:nowrap;}
  .chip.pts{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;}
  .chip.gray{background:#f0eef8;color:var(--ink-2);}
  .chip.out{background:transparent;border:1.5px dashed #cfc9e4;color:var(--muted);}
  .chip.wait{background:#fff1cf;color:#9a6b00;}

  /* ===== segmented control ===== */
  .seg{display:flex;background:#e7e3f5;border-radius:16px;padding:4px;gap:4px;}
  .seg button{
    flex:1;border:0;background:transparent;border-radius:12px;padding:9px 6px;cursor:pointer;
    font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-2);transition:all .15s;
  }
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);}

  /* ===== progress bar ===== */
  .bar{height:12px;background:#ece9f6;border-radius:10px;overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--a),var(--b));transition:width .5s cubic-bezier(.4,1.3,.5,1);}

  /* ===== pet card ===== */
  .pet-photo{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:24px;}

  /* ===== bottom nav (legacy, hidden on desktop) ===== */
  .nav{display:none;}

  /* ===== misc ===== */
  .row{display:flex;align-items:center;gap:10px;}
  .between{justify-content:space-between;}
  .wrap{flex-wrap:wrap;}
  .muted{color:var(--ink-2);}
  .center{text-align:center;}
  .grow{flex:1;min-width:0;}
  .pop{animation:pop .4s cubic-bezier(.3,1.5,.5,1);}
  @keyframes pop{0%{transform:scale(.8);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .float{animation:float 3.5s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .fade{animation:fade .35s ease;}
  @keyframes fade{from{transform:translateY(8px);}to{transform:none;}}

  /* confetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti i{position:absolute;width:10px;height:14px;border-radius:2px;top:-20px;animation:fall 1.5s linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}

  /* toast */
  .toast{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;
    padding:11px 18px;border-radius:16px;box-shadow:var(--shadow);z-index:120;white-space:nowrap;
    animation:toastIn .3s ease;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

  /* reward grid */
  .rewards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .reward{border-radius:16px;padding:10px 4px;text-align:center;background:#f6f4fc;position:relative;}
  .reward.unlocked{background:linear-gradient(135deg,var(--c),#fff);box-shadow:var(--shadow-sm);}
  .reward .ri{font-size:24px;filter:grayscale(1);opacity:.45;}
  .reward.unlocked .ri{filter:none;opacity:1;}
  .reward .rp{font-family:var(--font-display);font-weight:700;font-size:10.5px;color:var(--ink-2);margin-top:3px;}

  /* load comparison bars */
  .loadbar{height:26px;border-radius:13px;background:#ece9f6;overflow:hidden;position:relative;}
  .loadbar > i{display:block;height:100%;border-radius:13px;transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .loadbar .lv{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--ink);}

  /* ===== delete button on custom tasks ===== */
  .mission .del{border:0;background:#f3eef9;color:var(--muted);width:26px;height:26px;border-radius:50%;font-size:17px;cursor:pointer;flex:0 0 auto;display:grid;place-items:center;line-height:1;margin-left:2px;}
  .mission .del:active{background:#fde2e2;color:#d33;}

  /* ===== add-task button ===== */
  .add-btn{width:100%;border:2px dashed #cfc9e4;background:transparent;border-radius:18px;padding:14px;font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--a);cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
  .add-btn:active{transform:scale(.98);}

  /* ===== modal ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(30,22,60,.46);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s ease;}
  .sheet{width:100%;max-width:470px;background:#fff;border-radius:26px;padding:24px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);max-height:90vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.3,1,.4,1);}
  @keyframes sheetUp{from{transform:translateY(16px) scale(.98);opacity:.6;}to{transform:none;opacity:1;}}
  @media(max-width:560px){
    .modal-bg{align-items:flex-end;padding:0;}
    .sheet{max-width:none;border-radius:30px 30px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));}
  }
  .fld{margin-top:16px;}
  .fld > label{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink-2);display:block;margin-bottom:8px;}
  .inp{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-family:var(--font-body);font-weight:700;font-size:15px;color:var(--ink);background:#faf9ff;}
  .inp:focus{outline:none;border-color:var(--a);}
  .pick-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .pick-row::-webkit-scrollbar{height:0;}
  .pick-row .pk{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:.5;transition:opacity .15s;}
  .pick-row .pk.on{opacity:1;}
  .pick-row .pk .lbl{font-size:11.5px;font-weight:700;font-family:var(--font-display);color:var(--ink-2);}
  .ico-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:7px;}
  .ico{aspect-ratio:1;border-radius:13px;border:2px solid var(--line);background:#faf9ff;font-size:18px;display:grid;place-items:center;cursor:pointer;transition:all .12s;}
  .ico.on{border-color:var(--a);background:var(--c);transform:scale(1.05);}
  .btn-primary{width:100%;margin-top:20px;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-family:var(--font-display);font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 12px 24px -10px var(--a);}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
