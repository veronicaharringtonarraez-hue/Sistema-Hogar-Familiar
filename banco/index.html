<!DOCTYPE html>
<html lang="es" data-theme="caramelo" data-corners="redondas">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Banco Crece — Aprende economía jugando</title>
<!-- Instalable como app "ChildBank" -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2563EB" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="ChildBank" />
<link rel="apple-touch-icon" href="icons/childbank-512.png" />
<link rel="icon" type="image/png" href="icons/childbank-512.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* ============ THEMES ============ */
:root{
  --text-scale: 1;
  --brand:#FF9F1C; --brand-ink:#7a4a00;
  --green:#1FB85A; --red:#FF4D5E; --blue:#2E8BFF; --purple:#A855F7; --orange:#FF7A45;
  --radius:24px; --radius-sm:16px; --radius-xs:12px;
}
[data-corners="suaves"]{ --radius:14px; --radius-sm:10px; --radius-xs:8px; }

[data-theme="caramelo"]{
  --bg: radial-gradient(120% 90% at 50% 0%, #FFE7C2 0%, #FFD8E6 45%, #E9D5FF 100%);
  --surface:#FFF7FB; --card:#FFFFFF; --card-2:#FFF1F6;
  --text:#3A2A3F; --text-soft:#6b5a70; --muted:#9a8aa0;
  --line:#F0DCE8; --shadow: 0 10px 30px rgba(190,90,140,.16);
  --nav-bg:#FFFFFF;
}
[data-theme="aventura"]{
  --bg: radial-gradient(120% 90% at 50% 0%, #D8F3DC 0%, #C7E9C0 45%, #FDE7C7 100%);
  --surface:#F6FBF3; --card:#FFFFFF; --card-2:#EEF8E9;
  --text:#243826; --text-soft:#52684f; --muted:#86987f;
  --line:#DDEBD3; --shadow: 0 10px 30px rgba(60,130,70,.16);
  --brand:#F4A011; --nav-bg:#FFFFFF;
}
[data-theme="galaxia"]{
  --bg: radial-gradient(120% 90% at 50% 0%, #2B2466 0%, #161241 45%, #0B0A24 100%);
  --surface:#181645; --card:#231F5B; --card-2:#2C2870;
  --text:#F3F0FF; --text-soft:#C3BEEA; --muted:#8a83c0;
  --line:#37327d; --shadow: 0 14px 36px rgba(0,0,0,.4);
  --brand:#FFC94D; --nav-bg:#1B1850;
}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html{ font-size: calc(16px * var(--text-scale)); }
body{
  font-family:'Nunito',system-ui,sans-serif;
  background: var(--bg); background-attachment: fixed;
  color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input{ font-family:inherit; }
h1,h2,h3{ font-family:'Baloo 2',cursive; font-weight:700; line-height:1.1; }

/* ============ APP SHELL ============ */
.bc-app{
  max-width:480px; margin:0 auto; min-height:100vh;
  background:var(--surface);
  display:flex; flex-direction:column;
  box-shadow: 0 0 60px rgba(0,0,0,.10);
  position:relative; overflow:hidden;
}
@media(min-width:520px){
  .bc-app{ min-height:100vh; }
}

.bc-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 10px; position:sticky; top:0; z-index:20;
  background:var(--surface);
}
.bc-brand{ display:flex; align-items:center; gap:8px; }
.bc-coin{
  width:34px; height:34px; border-radius:50%;
  display:grid; place-items:center;
  background:linear-gradient(135deg,#FFD980,var(--brand));
  color:#7a4a00; font-family:'Baloo 2'; font-weight:800; font-size:1.2rem;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.12), 0 3px 8px rgba(255,160,0,.4);
}
.bc-brand-name{ font-family:'Baloo 2'; font-weight:800; font-size:1.25rem; color:var(--text); }
.bc-parent-btn{
  display:flex; align-items:center; gap:6px;
  background:var(--card); border:2px solid var(--line);
  padding:7px 12px; border-radius:999px; font-weight:800; font-size:.82rem; color:var(--text-soft);
  box-shadow:var(--shadow);
}
.bc-parent-btn span{ }

/* child switch */
.bc-child-switch{
  display:flex; gap:8px; padding:4px 14px 12px; overflow-x:auto;
}
.bc-child-tab{
  flex:1; min-width:88px; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 6px; border-radius:var(--radius-sm); background:var(--card);
  border:2.5px solid transparent; transition:.18s; opacity:.6;
}
.bc-child-tab.on{ opacity:1; border-color:var(--cc); background:var(--ccs); }
[data-theme="galaxia"] .bc-child-tab.on{ background:var(--card-2); }
.bc-child-av{ font-size:1.8rem; line-height:1; }
.bc-child-nm{ font-family:'Baloo 2'; font-weight:700; font-size:.92rem; color:var(--text); }

/* main */
.bc-main{ flex:1; overflow-y:auto; padding:4px 14px 110px; }
.bc-screen{ display:flex; flex-direction:column; gap:14px; animation:fade .3s ease; }
@keyframes fade{ from{ transform:translateY(10px); } to{ transform:none; } }

.bc-screen-head h2{ font-size:1.5rem; color:var(--text); }
.bc-screen-head p{ color:var(--text-soft); font-size:.92rem; margin-top:2px; font-weight:600; }
.bc-screen-head.tight{ margin-top:-4px; }
.bc-section-title{ font-family:'Baloo 2'; font-weight:700; font-size:1.05rem; color:var(--text-soft); margin-top:4px; }

/* ============ NAV ============ */
.bc-nav{
  position:absolute; bottom:0; left:0; right:0; z-index:25;
  display:flex; background:var(--nav-bg); border-top:2px solid var(--line);
  padding:8px 4px calc(8px + env(safe-area-inset-bottom)); gap:2px;
}
.bc-nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:5px 2px; border-radius:14px; color:var(--muted); transition:.15s; font-weight:800;
}
.bc-nav-ic{ font-size:1.4rem; line-height:1; filter:grayscale(.4); opacity:.65; transition:.15s; }
.bc-nav-lb{ font-size:.66rem; }
.bc-nav-btn.on{ color:var(--cc); }
.bc-nav-btn.on .bc-nav-ic{ filter:none; opacity:1; transform:translateY(-2px) scale(1.12); }

/* ============ CARDS / BUTTONS ============ */
.bc-card{ background:var(--card); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); border:1px solid var(--line); }
.bc-btn-primary{
  background:linear-gradient(135deg,var(--brand),#FF7A45); color:#fff;
  font-family:'Baloo 2'; font-weight:700; font-size:1rem;
  padding:14px 20px; border-radius:999px; box-shadow:0 6px 16px rgba(255,122,69,.35);
  transition:.15s;
}
.bc-btn-primary:active{ transform:scale(.96); }
.bc-btn-primary:disabled{ background:#cbb; opacity:.5; box-shadow:none; }
.bc-btn-primary.full{ width:100%; }
.bc-btn-ghost{
  background:var(--card-2); color:var(--text-soft); font-family:'Baloo 2'; font-weight:700;
  padding:14px 18px; border-radius:999px; border:2px solid var(--line);
}
.bc-link-btn{ color:var(--muted); font-weight:700; font-size:.85rem; text-decoration:underline; padding:8px; }
.bc-two-btn{ display:flex; gap:10px; margin-top:6px; }
.bc-two-btn>*{ flex:1; }
.bc-input{
  width:100%; background:var(--surface); border:2px solid var(--line);
  border-radius:var(--radius-xs); padding:11px 14px; font-size:1rem; font-weight:700; color:var(--text);
}
.bc-input.num{ width:110px; text-align:center; }
.bc-input:focus{ outline:none; border-color:var(--brand); }
.bc-chip-row{ display:flex; gap:8px; }
.bc-chip-row.wrap{ flex-wrap:wrap; }
.bc-chip{ background:var(--card-2); border:2px solid var(--line); border-radius:999px; padding:8px 16px; font-weight:800; color:var(--text-soft); }
.bc-chip.green{ background:#1FB85A18; border-color:#1FB85A55; color:#159a48; }
.bc-money{ font-variant-numeric:tabular-nums; font-weight:800; }
.bc-money.big{ font-size:1.8rem; font-family:'Baloo 2'; }

/* ============ AVATAR / PROGRESS / STAT ============ */
.bc-avatar{ border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.bc-progress{ width:100%; background:var(--card-2); border-radius:999px; overflow:hidden; position:relative; }
.bc-progress-fill{ height:100%; border-radius:999px; transition:width .5s cubic-bezier(.2,.8,.2,1); }
.bc-progress-label{ position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:.7rem; font-weight:900; color:#fff; }
.bc-stat{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow); }
.bc-stat-icon{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center; font-size:1.2rem; flex-shrink:0; }
.bc-stat-value{ font-family:'Baloo 2'; font-weight:800; font-size:1.1rem; }
.bc-stat-label{ font-size:.72rem; color:var(--muted); font-weight:700; }

/* ============ INICIO ============ */
.bc-balance-card{ border-radius:var(--radius); padding:20px; color:#fff; box-shadow:0 12px 30px rgba(0,0,0,.2); }
.bc-balance-top{ display:flex; align-items:center; justify-content:space-between; font-weight:800; opacity:.92; font-size:.95rem; }
.bc-balance-amount{ font-family:'Baloo 2'; font-weight:800; font-size:3rem; line-height:1; margin:6px 0 8px; text-shadow:0 2px 0 rgba(0,0,0,.12); }
.bc-balance-sub{ font-weight:700; opacity:.95; font-size:.95rem; }
.bc-quick-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.bc-quick{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 4px; display:flex; flex-direction:column; align-items:center; gap:5px; font-weight:800; font-size:.78rem; color:var(--text-soft); box-shadow:var(--shadow); transition:.15s; }
.bc-quick:active{ transform:scale(.94); }
.bc-quick-ic{ width:42px; height:42px; border-radius:14px; display:grid; place-items:center; font-size:1.4rem; background:color-mix(in srgb, var(--qc) 16%, transparent); }
.bc-goal-card{ display:flex; flex-direction:column; gap:10px; }
.bc-goal-head{ display:flex; align-items:center; gap:12px; }
.bc-goal-emoji{ font-size:2.2rem; }
.bc-goal-name{ font-family:'Baloo 2'; font-weight:700; font-size:1.05rem; color:var(--text); }
.bc-goal-nums{ font-weight:700; color:var(--text-soft); font-size:.9rem; }
.bc-goal-left{ font-size:.88rem; color:var(--text-soft); font-weight:700; }
.bc-goal-done{ font-size:.95rem; color:var(--green); font-weight:800; }
.bc-mini-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.bc-allpaid{ background:#1FB85A18; border:2px solid #1FB85A44; border-radius:var(--radius-sm); padding:14px; text-align:center; font-weight:800; color:#159a48; }

/* ============ GANAR ============ */
.bc-chore-list{ display:flex; flex-direction:column; gap:10px; }
.bc-chore{ display:flex; align-items:center; gap:12px; padding:12px 14px; transition:.15s; }
.bc-chore.active{ border-color:var(--green); background:#1FB85A0e; }
.bc-chore-ic{ font-size:1.7rem; width:46px; height:46px; border-radius:14px; display:grid; place-items:center; background:var(--card-2); flex-shrink:0; }
.bc-chore-info{ flex:1; min-width:0; }
.bc-chore-label{ font-family:'Baloo 2'; font-weight:600; font-size:.98rem; color:var(--text); }
.bc-chore-pts{ font-weight:800; color:var(--green); font-size:.85rem; margin-top:2px; }
.bc-servicio-edit{ display:flex; align-items:center; gap:8px; color:var(--text-soft); }
.bc-servicio-edit button{ width:24px; height:24px; border-radius:8px; background:var(--card-2); font-weight:900; color:var(--text-soft); }
.bc-stepper{ display:flex; align-items:center; gap:8px; background:var(--card-2); border-radius:999px; padding:4px; }
.bc-stepper button{ width:34px; height:34px; border-radius:50%; background:var(--card); font-size:1.3rem; font-weight:900; color:var(--brand); box-shadow:0 2px 5px rgba(0,0,0,.08); display:grid; place-items:center; }
.bc-stepper button:disabled{ opacity:.35; }
.bc-stepper>span{ min-width:22px; text-align:center; font-family:'Baloo 2'; font-weight:800; font-size:1.1rem; }
.bc-earn-bar{ position:sticky; bottom:0; display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--card); border:2px solid var(--line); border-radius:var(--radius); padding:12px 14px; box-shadow:0 -6px 20px rgba(0,0,0,.08); }
.bc-earn-bar-label{ font-size:.78rem; color:var(--muted); font-weight:800; }
.bc-earn-bar-total{ font-family:'Baloo 2'; font-weight:800; font-size:1.6rem; color:var(--green); }

/* ============ PAGAR ============ */
.bc-pay-balance{ display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--card); border:2.5px dashed; border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); }
.bc-pay-balance>span{ font-weight:800; color:var(--muted); font-size:.82rem; }
.bc-bill-list{ display:flex; flex-direction:column; gap:10px; }
.bc-bill{ display:flex; align-items:center; gap:12px; padding:12px 14px; transition:.2s; }
.bc-bill.paid{ opacity:.62; }
.bc-bill-ic{ font-size:1.6rem; width:46px; height:46px; border-radius:14px; display:grid; place-items:center; background:var(--card-2); flex-shrink:0; }
.bc-bill-info{ flex:1; min-width:0; }
.bc-bill-label{ font-family:'Baloo 2'; font-weight:600; font-size:.98rem; color:var(--text); }
.bc-bill-desc{ font-size:.76rem; color:var(--muted); font-weight:600; margin-top:1px; }
.bc-bill-amount{ font-family:'Baloo 2'; font-weight:800; font-size:1.1rem; color:var(--text); }
.bc-bill-pay{ background:var(--brand); color:#fff; font-family:'Baloo 2'; font-weight:700; padding:9px 16px; border-radius:999px; font-size:.9rem; box-shadow:0 4px 10px rgba(255,122,69,.3); }
.bc-bill-pay:disabled{ background:var(--red); opacity:.55; box-shadow:none; }
.bc-bill-done{ font-weight:800; color:var(--green); font-size:.85rem; white-space:nowrap; }
.bc-bill.diezmo{ border-color:#A855F744; }

/* ============ AHORRO ============ */
.bc-piggy-card{ background:linear-gradient(135deg,#FFD0E4,#D9C2FF); border-radius:var(--radius); padding:22px; text-align:center; box-shadow:var(--shadow); }
[data-theme="aventura"] .bc-piggy-card{ background:linear-gradient(135deg,#C7E9C0,#FDE7C7); }
[data-theme="galaxia"] .bc-piggy-card{ background:linear-gradient(135deg,#3A327d,#5b4ba8); }
.bc-piggy-emoji{ font-size:3rem; }
.bc-piggy-amount{ font-family:'Baloo 2'; font-weight:800; font-size:2.6rem; color:#7a3a66; line-height:1; margin-top:4px; }
[data-theme="galaxia"] .bc-piggy-amount{ color:#fff; }
.bc-piggy-label{ font-weight:800; color:#9a5a86; margin-top:2px; }
[data-theme="galaxia"] .bc-piggy-label{ color:#D7CFFF; }
.bc-save-box{ display:flex; flex-direction:column; gap:12px; align-items:stretch; }
.bc-save-title{ font-family:'Baloo 2'; font-weight:700; font-size:1.1rem; }
.bc-save-hint{ font-size:.82rem; color:var(--text-soft); font-weight:700; margin-top:-6px; }
.bc-amount-row{ display:flex; align-items:center; justify-content:center; gap:16px; }
.bc-amount-row.sm{ gap:12px; }
.bc-amount-row button{ width:50px; height:50px; border-radius:50%; background:var(--card-2); font-size:1.7rem; font-weight:900; color:var(--brand); display:grid; place-items:center; box-shadow:inset 0 -2px 0 rgba(0,0,0,.06); }
.bc-amount-val{ font-family:'Baloo 2'; font-weight:800; font-size:2rem; min-width:90px; text-align:center; color:var(--text); }

/* ============ REGISTRO ============ */
.bc-reg-summary{ display:flex; gap:10px; }
.bc-reg-sum-item{ flex:1; border-radius:var(--radius-sm); padding:12px 14px; font-weight:800; }
.bc-reg-sum-item span{ display:block; font-size:.74rem; opacity:.8; }
.bc-reg-sum-item strong{ font-family:'Baloo 2'; font-size:1.4rem; }
.bc-reg-sum-item.in{ background:#1FB85A16; color:#159a48; }
.bc-reg-sum-item.out{ background:#FF4D5E16; color:#d83947; }
.bc-filter-row{ display:flex; gap:8px; overflow-x:auto; }
.bc-filter{ padding:8px 16px; border-radius:999px; background:var(--card-2); font-weight:800; color:var(--text-soft); font-size:.85rem; white-space:nowrap; border:2px solid transparent; }
.bc-filter.on{ background:var(--card); border-color:var(--brand); color:var(--brand); }
.bc-tx-list{ display:flex; flex-direction:column; gap:8px; }
.bc-tx{ display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 14px; }
.bc-tx-ic{ width:40px; height:40px; border-radius:12px; display:grid; place-items:center; font-size:1.2rem; flex-shrink:0; }
.bc-tx-info{ flex:1; min-width:0; }
.bc-tx-label{ font-weight:800; font-size:.92rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bc-tx-date{ font-size:.72rem; color:var(--muted); font-weight:600; }
.bc-tx-amount{ font-family:'Baloo 2'; font-weight:800; font-size:1.05rem; }
.bc-empty{ text-align:center; color:var(--muted); padding:30px; font-weight:700; }

/* ============ PRESUPUESTO ============ */
.bc-budget-rule{ display:flex; flex-direction:column; gap:10px; }
.bc-rule-title{ font-family:'Baloo 2'; font-weight:700; font-size:1.05rem; }
.bc-rule-bars{ display:flex; gap:3px; height:34px; }
.bc-rule-seg{ display:grid; place-items:center; color:#fff; font-weight:900; font-size:.8rem; border-radius:6px; }
.bc-rule-legend{ display:flex; flex-wrap:wrap; gap:10px 14px; }
.bc-rule-legend span{ display:flex; align-items:center; gap:5px; font-size:.78rem; font-weight:800; color:var(--text-soft); }
.bc-rule-legend i{ width:12px; height:12px; border-radius:4px; display:inline-block; }
.bc-budget-list{ display:flex; flex-direction:column; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
.bc-budget-row{ display:flex; align-items:center; gap:12px; }
.bc-budget-ic{ font-size:1.4rem; width:38px; text-align:center; flex-shrink:0; }
.bc-budget-main{ flex:1; display:flex; flex-direction:column; gap:5px; }
.bc-budget-top{ display:flex; justify-content:space-between; font-weight:700; font-size:.9rem; color:var(--text); }
.bc-budget-total{ display:flex; flex-direction:column; gap:8px; }
.bc-bt-row{ display:flex; justify-content:space-between; font-weight:800; color:var(--text); font-size:.95rem; }
.bc-bt-row strong{ font-family:'Baloo 2'; }
.bc-budget-tip{ background:#FFB02016; border:2px solid #FFB02040; font-weight:700; color:var(--text-soft); font-size:.9rem; line-height:1.5; }

/* ============ MODAL / PIN ============ */
.bc-modal-overlay{ position:fixed; inset:0; background:rgba(20,10,30,.45); backdrop-filter:blur(4px); z-index:60; display:flex; align-items:flex-end; justify-content:center; padding:0; animation:fade .2s; }
@media(min-width:520px){ .bc-modal-overlay{ align-items:center; padding:20px; } }
.bc-modal{ background:var(--surface); width:100%; max-width:460px; border-radius:var(--radius) var(--radius) 0 0; padding:18px; box-shadow:0 -10px 40px rgba(0,0,0,.25); max-height:90vh; overflow-y:auto; border-top:5px solid var(--accent); animation:slideUp .28s cubic-bezier(.2,.8,.2,1); }
@media(min-width:520px){ .bc-modal{ border-radius:var(--radius); border-top:5px solid var(--accent); } }
@keyframes slideUp{ from{ transform:translateY(40px); opacity:0; } to{ transform:none; opacity:1; } }
.bc-modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.bc-modal-head h3{ font-size:1.25rem; }
.bc-x{ width:34px; height:34px; border-radius:50%; background:var(--card-2); font-weight:900; color:var(--text-soft); display:grid; place-items:center; }
.bc-x.big{ width:40px; height:40px; font-size:1.1rem; }
.bc-modal-note{ color:var(--text-soft); font-weight:700; font-size:.9rem; margin-bottom:10px; text-align:center; }
.bc-pinpad{ text-align:center; }
.bc-pin-prompt{ font-weight:700; color:var(--text-soft); font-size:.9rem; margin-bottom:14px; }
.bc-pin-dots{ display:flex; justify-content:center; gap:14px; margin-bottom:8px; }
.bc-pin-dot{ width:16px; height:16px; border-radius:50%; background:var(--card-2); border:2px solid var(--line); transition:.15s; }
.bc-pin-dot.on{ background:var(--brand); border-color:var(--brand); transform:scale(1.15); }
.bc-pin-error{ color:var(--red); font-weight:800; font-size:.85rem; margin:6px 0; }
.bc-pin-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:280px; margin:14px auto 4px; }
.bc-pin-key{ aspect-ratio:1.4; border-radius:var(--radius-sm); background:var(--card); border:1px solid var(--line); font-family:'Baloo 2'; font-weight:700; font-size:1.6rem; color:var(--text); box-shadow:var(--shadow); transition:.1s; }
.bc-pin-key:active{ transform:scale(.93); background:var(--card-2); }
.bc-pin-key.del{ font-size:1.3rem; color:var(--text-soft); }
.bc-pin-change{ display:flex; flex-direction:column; gap:10px; }

/* ============ PARENT ============ */
.bc-overlay{ position:fixed; inset:0; z-index:70; background:var(--bg); background-attachment:fixed; overflow-y:auto; }
.bc-parent{ max-width:480px; margin:0 auto; min-height:100vh; background:var(--surface); padding-bottom:40px; }
.bc-parent-bar{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; position:sticky; top:0; background:var(--surface); z-index:5; border-bottom:1px solid var(--line); }
.bc-parent-bar h2{ font-size:1.3rem; }
.bc-parent-tabs{ display:flex; gap:8px; padding:14px 16px 4px; }
.bc-ptab{ flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; border-radius:var(--radius-sm); background:var(--card); border:2.5px solid transparent; font-family:'Baloo 2'; font-weight:700; color:var(--text-soft); opacity:.6; }
.bc-ptab.on{ opacity:1; border-color:var(--cc); color:var(--text); }
.bc-parent-body{ padding:12px 16px; display:flex; flex-direction:column; gap:12px; }
.bc-parent-balance{ display:flex; border-radius:var(--radius); padding:14px; }
.bc-parent-balance>div{ flex:1; text-align:center; }
.bc-parent-balance span{ display:block; font-size:.72rem; font-weight:800; color:var(--text-soft); }
.bc-parent-balance strong{ font-family:'Baloo 2'; font-size:1.4rem; }
.bc-padmin{ display:flex; flex-direction:column; gap:10px; }
.bc-padmin-title{ font-family:'Baloo 2'; font-weight:700; font-size:1.05rem; color:var(--text); }
.bc-muted{ color:var(--text-soft); font-weight:600; font-size:.88rem; line-height:1.5; }
.bc-admin-btn{ width:100%; text-align:left; background:var(--card-2); border:2px solid var(--line); border-radius:var(--radius-xs); padding:12px 14px; font-weight:800; color:var(--text); }
.bc-admin-btn.danger{ background:#FF4D5E14; border-color:#FF4D5E44; color:#d83947; }
.bc-padmin.danger{ background:transparent; box-shadow:none; border:none; padding:0; }
.bc-exam-row{ display:flex; align-items:center; gap:12px; }
.bc-exam-row label{ font-weight:800; color:var(--text-soft); }
.bc-exam-result{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-radius:var(--radius-xs); font-weight:800; }
.bc-exam-result strong{ font-family:'Baloo 2'; font-size:1.2rem; }
.bc-exam-scale{ font-size:.74rem; color:var(--muted); font-weight:700; text-align:center; }
.bc-emoji-row{ display:flex; flex-wrap:wrap; gap:6px; }
.bc-emoji-pick{ width:42px; height:42px; border-radius:12px; background:var(--card-2); border:2px solid transparent; font-size:1.4rem; display:grid; place-items:center; }
.bc-emoji-pick.on{ border-color:var(--cc); background:var(--card); }

/* ============ INSIGNIAS / PEDIDOS ============ */
.bc-parent-btn{ position:relative; }
.bc-dot{ position:absolute; top:-6px; right:-6px; min-width:20px; height:20px; padding:0 5px; border-radius:999px; background:var(--red); color:#fff; font-size:.72rem; font-weight:900; display:grid; place-items:center; box-shadow:0 2px 6px rgba(255,77,94,.5); }

.bc-pending-mine{ background:#FFB02014; border:2px solid #FFB02044; display:flex; flex-direction:column; gap:8px; }
.bc-pending-title{ font-family:'Baloo 2'; font-weight:700; color:var(--brand-ink); font-size:.95rem; }
[data-theme="galaxia"] .bc-pending-title{ color:var(--brand); }
.bc-pending-row{ display:flex; justify-content:space-between; align-items:center; font-size:1.1rem; }
.bc-pending-amt{ font-family:'Baloo 2'; font-weight:800; color:var(--brand-ink); }
[data-theme="galaxia"] .bc-pending-amt{ color:var(--brand); }

.bc-badge-teaser{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
.bc-badge-teaser-ic{ font-size:1.8rem; }
.bc-badge-teaser-txt{ flex:1; display:flex; flex-direction:column; }
.bc-badge-teaser-txt strong{ font-family:'Baloo 2'; font-weight:700; font-size:1rem; color:var(--text); }
.bc-badge-teaser-txt span{ font-size:.8rem; color:var(--muted); font-weight:700; }
.bc-badge-teaser-row{ display:flex; gap:3px; font-size:1.1rem; }
.bc-badge-teaser-row .lock{ opacity:.3; }

.bc-logros-head{ text-align:center; display:flex; flex-direction:column; gap:8px; align-items:center; padding:20px 16px; }
.bc-logros-head .bc-progress{ width:80%; margin-top:8px; }
.bc-logros-big{ font-family:'Baloo 2'; font-weight:800; font-size:2.6rem; line-height:1; }
.bc-logros-big span{ font-size:1.4rem; opacity:.6; }
.bc-logros-sub{ font-weight:800; color:var(--text-soft); }
.bc-logros-head .bc-progress{ width:80%; }
.bc-badge-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.bc-badge{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 12px; text-align:center; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:4px; align-items:center; transition:.2s; }
.bc-badge.off{ opacity:.55; filter:grayscale(.7); }
.bc-badge.on{ border-color:var(--bc); background:color-mix(in srgb, var(--bc) 8%, var(--card)); }
.bc-badge-ic{ font-size:2.2rem; width:60px; height:60px; border-radius:50%; display:grid; place-items:center; background:var(--card-2); }
.bc-badge.on .bc-badge-ic{ background:color-mix(in srgb, var(--bc) 18%, transparent); box-shadow:0 0 0 3px var(--bc); }
.bc-badge-name{ font-family:'Baloo 2'; font-weight:700; font-size:.95rem; color:var(--text); }
.bc-badge-desc{ font-size:.74rem; color:var(--muted); font-weight:600; line-height:1.35; }

.bc-pend-box{ display:flex; flex-direction:column; gap:10px; background:#FFB02012; border:2px solid #FFB02040; border-radius:var(--radius); padding:14px; }
.bc-pend-head{ font-family:'Baloo 2'; font-weight:700; font-size:1.1rem; color:var(--text); display:flex; align-items:center; gap:8px; }
.bc-pend-count{ background:var(--red); color:#fff; min-width:24px; height:24px; padding:0 6px; border-radius:999px; font-size:.82rem; font-weight:900; display:grid; place-items:center; }
.bc-pend-card{ display:flex; flex-direction:column; gap:10px; border-width:2px; }
.bc-pend-top{ display:flex; align-items:center; gap:8px; }
.bc-pend-av{ font-size:1.5rem; }
.bc-pend-top strong{ font-family:'Baloo 2'; font-size:1.05rem; }
.bc-pend-total{ margin-left:auto; font-family:'Baloo 2'; font-weight:800; font-size:1.2rem; }
.bc-pend-items{ list-style:none; display:flex; flex-direction:column; gap:5px; }
.bc-pend-items li{ display:flex; justify-content:space-between; font-weight:700; font-size:.9rem; color:var(--text-soft); }
.bc-pend-items b{ font-family:'Baloo 2'; color:var(--text); }

.bc-newbadge{ text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px; padding:8px 0 4px; }
.bc-newbadge-ic{ font-size:3.4rem; width:96px; height:96px; border-radius:50%; display:grid; place-items:center; animation:badgePop .5s cubic-bezier(.2,1.4,.4,1); }
@keyframes badgePop{ from{ transform:scale(.4) rotate(-20deg); opacity:0; } to{ transform:none; opacity:1; } }
.bc-newbadge-name{ font-family:'Baloo 2'; font-weight:800; font-size:1.5rem; color:var(--text); }
.bc-newbadge-desc{ font-weight:700; color:var(--text-soft); }
.bc-newbadge .bc-btn-primary{ margin-top:8px; }

/* ============ CONFETTI / TOAST ============ */
.bc-confetti{ position:fixed; inset:0; pointer-events:none; z-index:90; overflow:hidden; }
.bc-confetti span{ position:absolute; top:-20px; animation:confFall linear forwards; }
@keyframes confFall{ to{ transform:translateY(105vh) rotate(720deg); opacity:.9; } }
.bc-toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); z-index:95; background:var(--text); color:var(--surface); padding:12px 22px; border-radius:999px; font-family:'Baloo 2'; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,.3); animation:toastIn .3s; max-width:90vw; text-align:center; }
@keyframes toastIn{ from{ transform:translate(-50%,16px); opacity:0; } to{ transform:translate(-50%,0); opacity:1; } }
</style>
</head>
