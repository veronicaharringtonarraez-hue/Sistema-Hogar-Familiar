<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeClean-Up · Microtareas</title>
<link rel="icon" type="image/png" href="icon-homeclean.png">
<link rel="apple-touch-icon" href="icon-homeclean.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:'Baloo 2',system-ui,sans-serif; --font-body:'Nunito',system-ui,sans-serif;
    --bg:#eef0f8; --card:#fff; --ink:#221d3a; --ink-2:#6a6385; --muted:#9b96b4; --line:#ece9f6;
    --a:#7C5CFF; --b:#B69DFF; --good:#22c178; --shadow-sm:0 6px 16px -8px rgba(40,30,90,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 60px;position:relative;}
  h2{font-family:var(--font-display);margin:0;}

  /* top */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 4px 8px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 70%,transparent);z-index:20;}
  .hi{display:flex;align-items:center;gap:11px;}
  .hi .sm{font-size:12px;color:var(--ink-2);font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
  .hi .nm{font-family:var(--font-display);font-weight:800;font-size:21px;line-height:1.1;}
  .row{display:flex;align-items:center;}
  .home{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#fff;box-shadow:var(--shadow-sm);text-decoration:none;font-size:18px;}
  .chip{font-family:var(--font-display);font-weight:800;font-size:12px;padding:3px 10px;border-radius:20px;background:#f0eef8;color:var(--ink-2);white-space:nowrap;}
  .chip.pts{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;}
  .chip.pts.big{font-size:15px;padding:7px 14px;border-radius:18px;}

  /* profile switcher */
  .who{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 10px;}
  .who::-webkit-scrollbar{height:0;}
  .who .w{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;width:62px;cursor:pointer;opacity:.55;transition:.15s;}
  .who .w.on{opacity:1;transform:translateY(-1px);}
  .who .w span{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--ink-2);}
  .who .w.on span{color:var(--ink);}

  /* segmented */
  .seg{display:flex;background:#e7e3f5;border-radius:16px;padding:4px;gap:4px;margin:4px 0 14px;}
  .seg button{flex:1;border:0;background:transparent;border-radius:12px;padding:11px 6px;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-2);}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);}

  /* cards */
  .card{background:var(--card);border-radius:22px;box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:14px;}
  .card.progress{padding:14px 16px;}
  .eyebrow{font-family:var(--font-display);font-weight:700;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .between{justify-content:space-between;}
  .grow{flex:1;min-width:0;}
  .bar{height:12px;background:#ece9f6;border-radius:10px;overflow:hidden;margin-top:10px;}
  .bar>i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--a),var(--b));transition:width .5s;}

  .area-h{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .area-ic{font-size:24px;width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#f4f2fb;flex:0 0 auto;}
  .area-t{font-family:var(--font-display);font-weight:800;font-size:17px;line-height:1.05;}
  .area-c{font-size:12.5px;color:var(--ink-2);font-weight:600;}

  .sub{margin-top:10px;}
  .sub-h{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink);margin:6px 2px;display:flex;align-items:center;gap:8px;}
  .sub-h .freq{font-size:11px;font-weight:700;color:var(--muted);background:#f0eef8;padding:1px 8px;border-radius:10px;}

  /* microtask row */
  .mt{display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:14px;cursor:pointer;transition:background .12s;}
  .mt:hover{background:#faf9ff;}
  .mt .box{width:26px;height:26px;border-radius:8px;border:2.5px solid #d9d4ec;flex:0 0 auto;display:grid;place-items:center;font-size:14px;color:#fff;background:#fff;}
  .mt .box.claim{border-color:#f5a623;color:#f5a623;background:#fff7e9;}
  .mt .box.ok{background:var(--good);border-color:var(--good);}
  .mt-t{flex:1;font-size:14.5px;font-weight:600;min-width:0;}
  .mt.ok .mt-t{color:var(--muted);text-decoration:line-through;}
  .tagp{font-family:var(--font-display);font-weight:700;font-size:11px;color:#9a6b00;background:#fff1cf;padding:2px 8px;border-radius:10px;}
  .tagp.ok{color:#0f7a4a;background:#dff6e8;}
  /* premio de oro (tareas semanales: solo su día, valen 15) */
  .tagp.oro{color:#7a5200;background:linear-gradient(135deg,#ffe28a,#ffc94d);box-shadow:0 1px 3px rgba(196,140,0,.4);}
  .mt.gold{background:linear-gradient(90deg,#fffaf0,#fff);border:1.5px solid #ffe1a0;}
  .mt.gold:hover{background:#fff7e6;}
  .mt-t .oro-lb{font-family:var(--font-display);font-weight:700;font-size:10.5px;color:#b8860b;}

  .empty{padding:26px;text-align:center;color:var(--ink-2);font-weight:600;}

  /* parent rows */
  .qrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-top:1px solid var(--line);}
  .qrow:first-of-type{border-top:0;}
  .mini{border:0;border-radius:12px;padding:8px 11px;font-family:var(--font-display);font-weight:700;font-size:12.5px;cursor:pointer;}
  .mini.ok{background:var(--good);color:#fff;}
  .mini.no{background:#f3eef9;color:#b33;}
  .sel{width:100%;border:2px solid var(--line);border-radius:14px;padding:11px 12px;font-family:var(--font-body);font-weight:700;font-size:15px;background:#faf9ff;color:var(--ink);}
  .btn-primary{width:100%;margin-top:14px;border:0;border-radius:16px;padding:14px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-family:var(--font-display);font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 12px 24px -10px var(--a);}
  .link{display:block;margin:14px auto 0;border:0;background:transparent;color:var(--a);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:pointer;}

  /* PIN */
  .pinwrap{display:flex;justify-content:center;padding:8px;}
  .pinbox{max-width:320px;width:100%;text-align:center;}
  .dots{display:flex;justify-content:center;gap:12px;margin:14px 0 16px;}
  .dots i{width:15px;height:15px;border-radius:50%;background:#e3e0ee;}
  .dots i.on{background:var(--a);} .dots i.bad{background:#E53935;}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .keypad button{border:0;cursor:pointer;height:56px;border-radius:16px;font-family:var(--font-display);font-weight:800;font-size:22px;background:#f4f2fb;color:var(--ink);}

  /* toast */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;padding:11px 18px;border-radius:16px;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);z-index:120;white-space:nowrap;}

  /* nombres dobles */
  .hi .nm .nm-real{font-size:13px;color:var(--ink-2);font-weight:700;}
  .real{color:var(--muted);font-weight:700;font-size:12px;}
  .who .w small{font-size:10px;color:var(--muted);font-weight:700;line-height:1;}
  .mt-ic{font-size:18px;flex:0 0 auto;}

  /* momentos del día (acordeón) */
  .moment{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;border:2px solid transparent;}
  .moment.now{border-color:var(--a);}
  .moment-h{width:100%;display:flex;align-items:center;gap:12px;border:0;background:transparent;cursor:pointer;padding:14px 16px;text-align:left;}
  .moment-ic{font-size:24px;width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#f4f2fb;flex:0 0 auto;}
  .moment.now .moment-ic{background:linear-gradient(135deg,var(--a),var(--b));}
  .moment-t{font-family:var(--font-display);font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
  .moment-c{font-size:12px;color:var(--ink-2);font-weight:600;}
  .nowtag{font-family:var(--font-display);font-weight:800;font-size:10px;color:#fff;background:var(--a);padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;}
  .chev{font-size:16px;color:var(--muted);}
  .moment-body{padding:0 12px 12px;}
  .grp{margin-top:8px;}
  .grp-h{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink);margin:8px 6px 4px;}

  /* área con checklist */
  .areacard{background:#faf9ff;border:2px solid var(--line);border-radius:16px;padding:12px;margin:6px 0;}
  .areacard.claim{border-color:#f5a623;}
  .areacard.ok{border-color:var(--good);background:#f3fbf6;}
  .ptbadge{font-family:var(--font-display);font-weight:800;font-size:10px;color:var(--a);background:#efeaff;padding:2px 7px;border-radius:9px;vertical-align:middle;}
  .tagp.big{font-size:13px;padding:4px 10px;}
  .checklist{margin:8px 0;}
  .chk{display:flex;align-items:center;gap:10px;padding:7px 6px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink-2);}
  .chk:hover{background:#fff;}
  .chk .cbox{width:22px;height:22px;border-radius:7px;border:2.5px solid #d9d4ec;flex:0 0 auto;display:grid;place-items:center;font-size:12px;color:#fff;background:#fff;}
  .chk.on .cbox{background:var(--good);border-color:var(--good);}
  .chk.on{color:var(--muted);text-decoration:line-through;}
  .area-claim{width:100%;margin-top:6px;border:0;border-radius:13px;padding:11px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-family:var(--font-display);font-weight:800;font-size:14px;cursor:pointer;}
  .area-claim.claimed{background:#fff7e9;color:#9a6b00;border:2px solid #f5a623;}

  /* steppers de orden/limpieza */
  .oc{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
  .oc-row{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink-2);}
  .oc-row span{width:64px;}
  .oc-row b{min-width:18px;text-align:center;font-size:15px;color:var(--ink);}
  .oc-row button{width:26px;height:26px;border-radius:8px;border:0;background:#efeaff;color:var(--a);font-weight:900;font-size:16px;cursor:pointer;}

  /* ===== Privilegios por mérito ===== */
  .priv{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:12px;border:2px solid transparent;transition:transform .18s, box-shadow .18s;}
  .priv.lock{opacity:.55;filter:grayscale(1);}
  .priv.prog{border-color:#f5d58a;}
  .priv.open{border-color:var(--good);transform:scale(1.015);box-shadow:0 14px 30px -12px rgba(34,193,120,.5);animation:privPop .5s cubic-bezier(.2,1.4,.4,1);}
  @keyframes privPop{from{transform:scale(.96);}to{transform:scale(1.015);}}
  .priv-h{display:flex;align-items:center;gap:12px;}
  .priv-ic{font-size:26px;width:48px;height:48px;border-radius:14px;display:grid;place-items:center;background:#f4f2fb;flex:0 0 auto;}
  .priv.open .priv-ic{background:#dff6e8;}
  .priv-t{font-family:var(--font-display);font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
  .priv-c{font-size:12.5px;color:var(--ink-2);font-weight:600;}
  .priv-badge{font-family:var(--font-display);font-weight:800;font-size:10px;color:#fff;background:var(--good);padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;}
  .priv-bar{height:12px;background:#ece9f6;border-radius:10px;overflow:hidden;margin:10px 0 6px;}
  .priv-bar>i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--a),var(--b));transition:width .5s;}
  .priv.open .priv-bar>i{background:linear-gradient(90deg,#22c178,#48d28f);}
  .priv-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink-2);}
  .priv-prize{margin-top:10px;padding:9px 12px;border-radius:12px;background:#f4f2fb;color:var(--ink-2);font-weight:700;font-size:13px;text-align:center;}
  .priv-prize.on{background:#dff6e8;color:#0f7a4a;}
  .priv-action{width:100%;margin-top:10px;border:0;border-radius:14px;padding:12px;background:linear-gradient(135deg,#25D366,#1db954);color:#fff;font-family:var(--font-display);font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 10px 22px -10px #1db954;}
  .toggle{margin-left:auto;border:0;border-radius:999px;padding:3px 12px;font-family:var(--font-display);font-weight:800;font-size:11px;cursor:pointer;background:#eceaf4;color:var(--muted);}
  .toggle.on{background:var(--good);color:#fff;}
  textarea.sel{font-size:13px;line-height:1.4;}

  @media(min-width:900px){
    .content{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;align-items:start;}
    .content > .card{break-inside:avoid;}
    /* progress y momentos ocupan todo el ancho (flujo vertical del día) */
    .content > .card.progress{grid-column:1 / -1;}
    .content > .moment{grid-column:1 / -1;}
    .content > .priv{grid-column:1 / -1;}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Nube (Firebase) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script src="images.js"></script>
  <script src="data.js"></script>
  <script src="micro-data.js"></script>
  <script type="text/babel" src="micro-app.jsx"></script>
</body>
</html>
